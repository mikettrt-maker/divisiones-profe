<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto de División - V9 Persistencia Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #ffcc00; --primary-light: #ff9800; --text-dark: #e0e0e0;
            --bg-dark: #0f0f0f; --bg-panel: #1a1a1a; --success: #00e676; --error: #ff1744;
            --cell-size: 32px; 
            --rank-iron: #9e9e9e; --rank-bronze: #d97706; --rank-silver: #bdbdbd;
            --rank-gold: #fbbf24; --rank-platinum: #06b6d4; --rank-diamond: #8b5cf6; --rank-heroic: #ef4444;
        }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background-color: var(--bg-dark); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .main-header { width: 100%; background: linear-gradient(90deg, #000000, #1a1a1a); color: var(--primary-color); padding: 15px 0; text-align: center; box-shadow: 0 4px 20px rgba(255, 204, 0, 0.2); border-bottom: 2px solid var(--primary-color); display: flex; justify-content: center; align-items: center; gap: 20px; position: relative; }
        .main-header h1 { margin: 0; font-size: 2.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-family: 'Teko', sans-serif; }
        
        .season-badge { position: absolute; top: 5px; right: 20px; background: #333; color: var(--primary-color); font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .season-badge.active { background: var(--primary-color); color: black; }
        .season-badge.finished { background: var(--error); color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .timer-display { font-family: 'Teko'; font-size: 1.1rem; }

        .admin-btn { background: #333; color: var(--primary-color); padding: 5px 15px; font-size: 0.9rem; border: 1px solid var(--primary-color); border-radius: 4px; cursor: pointer; display: none; }
        .admin-btn.visible { display: block; }
        .app-container { width: 100%; max-width: 1500px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }

        .panel { background: var(--bg-panel); padding: 15px 25px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid #333; }
        .level-select { padding: 8px 12px; border-radius: 2px; border: 1px solid var(--primary-color); background: black; color: var(--primary-color); font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; outline: none; text-transform: uppercase; }
        
        .avatar-container { width: 60px; height: 60px; border-radius: 50%; overflow: hidden; border: 2px solid var(--primary-color); background-color: #000; position: relative; box-shadow: 0 0 10px var(--primary-color); flex-shrink: 0; cursor: pointer; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; background-color: black; }
        
        .avatar-iron { border-color: var(--rank-iron); box-shadow: 0 0 5px var(--rank-iron); }
        .avatar-bronze { border-color: var(--rank-bronze); box-shadow: 0 0 8px var(--rank-bronze); }
        .avatar-silver { border-color: var(--rank-silver); box-shadow: 0 0 8px var(--rank-silver); }
        .avatar-gold { border-color: var(--rank-gold); box-shadow: 0 0 15px var(--rank-gold); background: rgba(251, 191, 36, 0.1); }
        .avatar-platinum { border-color: var(--rank-platinum); box-shadow: 0 0 15px var(--rank-platinum); }
        .avatar-diamond { border-color: var(--rank-diamond); box-shadow: 0 0 15px var(--rank-diamond); background: rgba(124, 77, 255, 0.1); }
        .avatar-heroic { border-color: var(--rank-heroic); box-shadow: 0 0 20px var(--rank-heroic); background: rgba(255, 23, 68, 0.1); animation: heroPulse 2s infinite; }
        @keyframes heroPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 23, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); } }

        .user-info-panel { display: flex; align-items: center; gap: 15px; }
        .rank-box { display: flex; flex-direction: column; align-items: center; background: black; padding: 5px 15px; border-radius: 4px; border: 1px solid #444; min-width: 120px; }
        .rank-name { font-size: 1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .rank-progress { width: 100%; height: 4px; background: #333; border-radius: 0; margin-top: 4px; overflow: hidden; }
        .rank-progress-bar { height: 100%; transition: width 0.5s; background: var(--text-dark); }
        .rank-score-label { font-size: 0.8rem; color: #888; margin-top: 2px; }

        .progress-bar-container { flex-grow: 1; margin: 0 20px; height: 12px; background: #333; border-radius: 0; overflow: hidden; min-width: 100px; }
        .progress-bar-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--success); }

        .main-layout { display: flex; flex-direction: row; gap: 20px; width: 100%; align-items: flex-start; flex-wrap: wrap; }
        
        .ranking-sidebar { flex: 1; background: var(--bg-panel); padding: 20px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 280px; border: 1px solid #333; order: -1; }
        .ranking-title { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; font-family: 'Teko', sans-serif; }
        .ranking-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-left: 4px solid #333; transition: all 0.3s; }
        
        .hall-of-fame { margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; background: transparent; position: relative; overflow: hidden; }
        .hall-of-fame::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--error), transparent); }
        .hall-title { font-family: 'Teko'; font-size: 1.8rem; color: var(--error); text-align: center; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,23,68,0.5); }
        .fame-list { list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; }
        .fame-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        .fame-time { font-size: 0.75rem; color: #aaa; margin-left: auto; }

        .rank-row { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .list-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #333; flex-shrink: 0; }
        
        .rank-iron { color: var(--rank-iron); border-color: var(--rank-iron); }
        .rank-bronze { color: var(--rank-bronze); border-color: var(--rank-bronze); background: rgba(217, 119, 6, 0.1); }
        .rank-silver { color: var(--rank-silver); border-color: var(--rank-silver); }
        .rank-gold { color: var(--rank-gold); border-color: var(--rank-gold); background: rgba(251, 191, 36, 0.1); }
        .rank-platinum { color: var(--rank-platinum); border-color: var(--rank-platinum); background: rgba(0, 188, 212, 0.1); }
        .rank-diamond { color: var(--rank-diamond); border-color: var(--rank-diamond); background: rgba(124, 77, 255, 0.1); }
        .rank-heroic { color: var(--rank-heroic); border-color: var(--rank-heroic); background: rgba(255, 23, 68, 0.1); }
        
        .rank-pos { font-weight: 700; color: #666; width: 20px; font-size: 1rem; }
        .rank-info { flex-grow: 1; display: flex; flex-direction: column; }
        .rank-name-list { font-weight: 600; font-size: 0.9rem; }
        .rank-tier-list { font-size: 0.7rem; font-weight: 700; opacity: 0.8; }
        .rank-score { font-weight: 700; color: var(--primary-color); font-size: 0.9rem; }

        .game-area { flex: 3; display: flex; flex-direction: column; gap: 20px; min-width: 300px; }
        .workspace-card { background: var(--bg-panel); padding: 20px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; gap: 15px; justify-content: flex-start; align-items: flex-start; overflow-x: auto; width: 100%; box-sizing: border-box; border: 1px solid #333; }

        /* --- LAYOUT GALERA --- */
        .division-row { display: flex; flex-direction: row; align-items: flex-start; gap: 0; margin-top: 10px; flex-shrink: 0; }
        .col-divisor { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; margin-top: 38px; margin-right: 3px; }
        .input-div { width: var(--cell-size); height: var(--cell-size); border: 1px solid #555; background: black; font-size: 1.4rem; font-weight: 700; color: var(--primary-color); text-align: center; outline: none; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 5px var(--primary-color); }
        .col-grid { display: flex; flex-direction: column; position: relative; z-index: 1; }
        .grid-disabled-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 5; display: flex; align-items: center; justify-content: center; pointer-events: none; border-radius: 4px; }
        .grid-disabled-overlay.hidden { display: none; }
        .lock-msg { background: var(--primary-color); color: black; padding: 8px 15px; border-radius: 2px; font-size: 0.9rem; font-weight: 700; box-shadow: 0 0 20px var(--primary-color); pointer-events: auto; text-align: center; text-transform: uppercase; }
        .fila-cociente-arriba { display: flex; justify-content: flex-start; height: var(--cell-size); align-items: flex-end; padding-bottom: 4px; }
        .input-cociente-galera { width: var(--cell-size); height: var(--cell-size); border: 1px solid #555; background: #000; font-size: 1.4rem; font-weight: 700; color: var(--primary-color); text-align: center; outline: none; font-family: 'Rajdhani', sans-serif; margin-right: 1px; border-radius: 2px; cursor: text; pointer-events: auto; }
        .input-cociente-galera:disabled { background: #111; color: #444; border-color: #222; cursor: not-allowed; opacity: 0.5; pointer-events: none; }
        .fila-horizontal-top { height: 3px; background-color: var(--primary-color); box-shadow: 0 0 8px var(--primary-color); border-radius: 2px; width: 100%; }
        .grid-matriz { display: grid; grid-template-columns: repeat(9, var(--cell-size)); grid-template-rows: repeat(15, var(--cell-size)); background-color: #2a2a2a; border: 1px solid #444; border-radius: 0 0 4px 4px; border-top: none; }
        .cell { width: var(--cell-size); height: var(--cell-size); background-color: #1a1a1a; border: 1px solid #333; text-align: center; font-size: 1.1rem; font-weight: 600; outline: none; cursor: text; box-sizing: border-box; color: white; transition: background 0.2s; }
        .cell:focus { background: #333; box-shadow: inset 0 0 5px var(--primary-color); }
        .cell-locked { background: #000; font-weight: 700; color: var(--primary-color); border-color: #333; }
        .fila-residuo { display: flex; justify-content: flex-end; margin-top: 5px; height: var(--cell-size); align-items: center; }
        .residuo-label { color: #888; font-size: 0.9rem; margin-right: 5px; text-transform: uppercase; }
        .input-residuo { width: calc(var(--cell-size) * 2); height: var(--cell-size); border: 1px solid #555; background: #000; font-size: 1.4rem; font-weight: 700; color: var(--primary-color); text-align: center; outline: none; font-family: 'Rajdhani', sans-serif; border-radius: 2px; cursor: text; pointer-events: auto; }
        .input-residuo:disabled { background: #111; color: #444; border-color: #222; cursor: not-allowed; opacity: 0.5; pointer-events: none; }

        /* ANTENA */
        .antena-panel { background: var(--bg-panel); border: 1px solid #333; padding: 15px; border-radius: 4px; border-top: 4px solid var(--primary-color); width: 240px; flex-shrink: 0; margin-left: auto; }
        .antena-header { text-align: center; font-weight: 700; color: var(--primary-color); margin-bottom: 15px; font-size: 1.1rem; text-transform: uppercase; font-family: 'Teko', sans-serif; }
        .antena-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; opacity: 1; transition: opacity 0.3s; font-size: 0.9rem; }
        .antena-row.locked-row { opacity: 0.4; }
        .antena-input { width: 50px; height: 26px; font-size: 0.9rem; font-weight: 600; text-align: center; border: 1px solid #444; border-radius: 2px; background: black; color: white; -moz-appearance: textfield; }
        .antena-input::-webkit-outer-spin-button, .antena-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .antena-input:disabled { background: #111; color: #555; border-color: #222; cursor: not-allowed; }
        .status-ok { background-color: rgba(0, 230, 118, 0.2) !important; border-color: var(--success) !important; color: var(--success); }
        .status-wrong { background-color: rgba(255, 23, 68, 0.2) !important; border-color: var(--error) !important; color: var(--error); }

        .controls { background: black; padding: 20px; border-radius: 4px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 15px; width: 100%; box-sizing: border-box; }
        button { border: none; padding: 10px 24px; font-weight: 600; border-radius: 2px; cursor: pointer; font-size: 1.1rem; color: black; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; transition: all 0.2s; }
        .btn-primary { background: var(--primary-color); box-shadow: 0 0 15px var(--primary-color); }
        .btn-small { font-size: 0.9rem; padding: 5px 10px; background: #333; color: #ccc; border: 1px solid #555; }
        #msg { width: 100%; text-align: center; font-weight: 600; margin-top: 10px; font-size: 1.1rem; }

        /* VICTORY SCREEN */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 99999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .victory-title { font-size: 7rem; color: var(--primary-color); font-weight: 700; text-shadow: 0 0 30px var(--primary-color); font-family: 'Teko', sans-serif; animation: scaleUp 0.3s; text-transform: uppercase; }
        .confetti { position: absolute; width: 10px; height: 10px; background: #f00; animation: fall linear forwards; }
        @keyframes scaleUp { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        /* EPIC OVERLAY */
        #epic-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99990; display: none; justify-content: center; align-items: center; pointer-events: none; }
        .epic-text { font-family: 'Teko', sans-serif; font-size: 8rem; color: var(--error); text-transform: uppercase; font-weight: 800; text-shadow: 0 0 20px rgba(255,0,0,0.8), 4px 4px 0px #000; animation: epicPulse 0.5s ease-out; opacity: 0; }
        @keyframes epicPulse { 0% { transform: scale(0.2) rotate(-10deg); opacity: 0; } 50% { transform: scale(1.2) rotate(5deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

        /* CHAT UI */
        #chat-battle { position: fixed; bottom: 80px; right: 20px; width: 300px; z-index: 9000; background: rgba(0, 0, 0, 0.95); border: 1px solid #333; border-radius: 8px; display: none; }
        #chat-battle.visible { display: block; }
        .chat-header { padding: 8px 15px; background: #111; color: var(--primary-color); font-weight: 700; border-bottom: 1px solid #333; display: flex; justify-content: space-between; cursor: pointer;}
        .chat-messages { height: 200px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; }
        .chat-msg { margin-bottom: 5px; font-size: 0.95rem; }
        .chat-msg span { color: #888; }
        .chat-emoji { font-size: 1.2rem; margin-left: 5px; }
        .chat-input-bar { display: flex; padding: 8px; border-top: 1px solid #333; background: #111; justify-content: space-around; }
        .emoji-btn { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px 10px; filter: grayscale(50%); }
        .emoji-btn:hover { transform: scale(1.3); filter: grayscale(0%); }
        #chat-toggle-btn { position: fixed; bottom: 20px; right: 20px; z-index: 9001; width: 50px; height: 50px; border-radius: 50%; background: var(--primary-color); color: black; font-size: 1.5rem; border: none; box-shadow: 0 0 15px var(--primary-color); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* ADMIN MODAL */
        #admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100000; overflow-y: auto; padding: 20px; }
        .admin-box { background: var(--bg-panel); padding: 30px; border-radius: 10px; border: 2px solid var(--primary-color); width: 600px; max-width: 100%; color: white; display: flex; flex-direction: column; gap: 20px; }
        .admin-title { font-family: 'Teko'; font-size: 2.5rem; color: var(--primary-color); margin-bottom: 10px; text-align: center; }
        .admin-section { border-top: 1px solid #333; padding-top: 15px; }
        .admin-section h4 { margin: 0 0 10px 0; color: var(--primary-color); text-transform: uppercase; }
        .timer-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .timer-input { width: 60px; padding: 8px; background: black; border: 1px solid #555; color: white; font-size: 1rem; border-radius: 4px; text-align: center; }
        .user-list-admin { max-height: 300px; overflow-y: auto; border: 1px solid #333; background: #000; border-radius: 4px; }
        .user-row-admin { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .user-row-admin:last-child { border-bottom: none; }
        .user-name-admin { font-weight: 600; }
        .user-score-admin { font-size: 0.9rem; color: #aaa; margin-right: 10px; }
        .btn-ban { background: #444; color: white; padding: 5px 10px; font-size: 0.8rem; }
        .btn-ban.active { background: var(--error); }
        .btn-danger-big { background: var(--error); color: white; font-size: 1.2rem; padding: 15px 30px; width: 100%; margin-top: 10px; }

        /* Modals Dark */
        #login-screen, #avatar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: var(--bg-panel); padding: 40px; border-radius: 4px; width: 350px; border: 1px solid #333; }
        .login-box h2 { color: var(--primary-color); margin-top: 0; margin-bottom: 5px; font-family: 'Teko', sans-serif; font-size: 2.5rem; text-transform: uppercase; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 2px; background: black; color: white; font-family: 'Rajdhani', sans-serif; box-sizing: border-box; }
        .login-btn { width: 100%; margin-top: 10px; }
        .login-avatar-preview { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 20px auto; border: 2px solid var(--primary-color); overflow: hidden; background: black; box-shadow: 0 0 15px var(--primary-color); }
        .login-error { color: var(--error); font-size: 0.9rem; margin-top: 10px; display: none; }

        .modal-box { background: var(--bg-panel); padding: 30px; border-radius: 4px; width: 450px; max-height: 80vh; overflow-y: auto; text-align: center; border: 1px solid #333; }
        .modal-section { margin-bottom: 20px; }
        .modal-section h4 { margin: 0 0 10px 0; color: #888; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .avatar-option { cursor: pointer; padding: 5px; border-radius: 50%; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .avatar-option.selected { border-color: var(--primary-color); background: rgba(255, 204, 0, 0.1); }
        .avatar-option img { width: 50px; height: 50px; border-radius: 50%; background: #000; }
        .avatar-locked { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; }
        .lock-icon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); border-radius: 50%; color: #666; font-size: 1.2rem; pointer-events: none; }

        @media (max-width: 900px) { .main-layout { flex-direction: column; } .ranking-sidebar { width: 100%; order: 0; } }
    </style>
</head>
<body>

    <div id="victory-screen"><div class="victory-title">JUEGO TERMINADO</div><div class="confetti"></div></div>
    <div id="epic-overlay"><div class="epic-text" id="epic-text">¡BOOYAH!</div></div>
    
    <!-- ADMIN MODAL -->
    <div id="admin-modal" onclick="if(event.target.id === 'admin-modal') toggleAdmin()">
        <div class="admin-box" onclick="event.stopPropagation()">
            <div class="admin-title"><i class="fas fa-user-shield"></i> PANEL ADMIN</div>
            <div class="admin-section">
                <h4><i class="fas fa-clock"></i> Temporada</h4>
                <div id="timer-status" style="margin-bottom:10px; text-align:center; font-size:1.2rem; color:#aaa;">Cargando...</div>
                <div class="timer-controls">
                    <input type="number" id="input-hours" class="timer-input" placeholder="Hrs" min="0">
                    <input type="number" id="input-mins" class="timer-input" placeholder="Min" min="0">
                    <button class="btn-primary" onclick="startSeason()" style="font-size:1rem; padding: 8px 15px;">Iniciar</button>
                </div>
            </div>
            <div class="admin-section">
                <h4><i class="fas fa-users"></i> Usuarios</h4>
                <div class="user-list-admin" id="admin-user-list"></div>
            </div>
            <div class="admin-section">
                <button class="btn-danger-big" onclick="resetAllUsers()"><i class="fas fa-redo"></i> Reiniciar Puntos (Manual)</button>
            </div>
        </div>

        }
        function startCountdown(endDate) {
            clearInterval(seasonInterval);
            seasonInterval = setInterval(() => {
                const now = new Date(); const diff = endDate - now;
                if (diff <= 0) { clearInterval(seasonInterval); document.getElementById('timer-display').innerText = "00:00:00"; document.getElementById('season-badge').classList.add('finished'); document.getElementById('season-badge').classList.remove('active'); if(isAdmin) { alert("¡Tiempo terminado! Reiniciando puntos..."); resetAllUsers(true); } return; }
                const h = Math.floor(diff / 3600000); const m = Math.floor((diff % 3600000) / 60000); const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                document.getElementById('season-badge').classList.add('active'); document.getElementById('season-badge').classList.remove('finished');
            }, 1000);
        }
        async function startSeason() {
            const h = parseInt(document.getElementById('input-hours').value) || 0; const m = parseInt(document.getElementById('input-mins').value) || 0;
            if(h === 0 && m === 0) return alert("Ingresa tiempo.");
            const endTime = new Date(new Date().getTime() + (h * 3600000) + (m * 60000));
            try { await _supabase.from('game_settings').upsert({ id: 1, season_end_time: endTime.toISOString() }); alert("¡Temporada iniciada!"); startCountdown(endTime); } catch(e) { alert("Error al iniciar."); }
        }
        async function loadAdminUsers() {
            const list = document.getElementById('admin-user-list'); list.innerHTML = 'Cargando...';
            try {
                const { data, error } = await _supabase.from('profiles').select('id, username, total_score, is_banned').order('total_score', { ascending: false });
                if(error) throw error;
                list.innerHTML = data.map(u => `
                    <div class="user-row-admin">
                        <div><span class="user-name-admin">${u.username}</span><span class="user-score-admin">${u.total_score} pts</span></div>
                        <button class="btn-ban ${u.is_banned ? 'active' : ''}" onclick="toggleBan('${u.id}', ${u.is_banned})">${u.is_banned ? 'BANEADO' : 'Banear'}</button>
                    </div>
                `).join('');
            } catch(e) { list.innerHTML = 'Error'; }
        }
        async function toggleBan(uid, currentStatus) {
            try { await _supabase.from('profiles').update({ is_banned: !currentStatus }).eq('id', uid); loadAdminUsers(); updateRanking(); } catch(e) { alert("Error al banear."); }
        }
        async function resetAllUsers(isAuto = false) {
            if(!isAuto && !confirm("¿Reiniciar TODOS los puntos?")) return;
            try {
                await _supabase.from('profiles').update({ total_score: 0, current_level: 1, completed_at: null, current_problem: 1 }).neq('id', '00000000-0000-0000-0000-000000000000');
                if(!isAuto) alert("¡Reiniciado!"); toggleAdmin(); updateRanking(); loadHallOfFame();
                totalScore = 0; unlockedLevel = 1; currentProblemInLevel = 1; hasFinishedGame = false; updateUI(); initGame();
                if(!isAuto) { await _supabase.from('game_settings').update({ season_end_time: null }).eq('id', 1); document.getElementById('timer-display').innerText = "SIN INICIAR"; clearInterval(seasonInterval); document.getElementById('season-badge').classList.remove('active'); document.getElementById('season-badge').classList.add('finished'); }
            } catch(e) { alert("Error."); console.error(e); }
        }

        // --- GAME LOGIC ---
        function initGame() { loadProblem(); populateLevelSelect(); }
        function jumpToLevel(l) { AudioEngine.playClick(); const target = parseInt(l); if(target > unlockedLevel) { alert("¡Debes completar el nivel anterior!"); document.getElementById('levelSelect').value = currentMainLevel; return; } currentMainLevel = target; currentProblemInLevel = 1; loadProblem(); }
        
        function loadProblem() {
            if(hasFinishedGame) return; 
            isProcessing = false; const btn = document.getElementById('btn-verify'); btn.disabled = false; btn.style.opacity = '1'; btn.innerText = "Verificar";
            document.getElementById('subLevelCount').innerText = currentProblemInLevel; document.getElementById('progressBar').style.width = ((currentMainLevel - 1) / TOTAL_LEVELS) * 100 + '%'; populateLevelSelect();
            const d = DB[currentMainLevel]; if (d && d[currentProblemInLevel - 1]) { currentDividend = d[currentProblemInLevel - 1].d; currentDivisor = d[currentProblemInLevel - 1].div; }
            const label = getDifficultyLabel(currentMainLevel); document.getElementById('difficultyLabel').innerText = label; createUI(); createAntena(); resetAll(); lockGrid();
        }
        function getDifficultyLabel(lvl) { if(lvl <= 2) return "Divisor: 1 Cifra"; if(lvl === 3 || lvl === 4 || lvl === 5 || lvl === 7 || lvl === 9) return "Divisor: 2 Cifras"; return "Divisor: 3 Cifras"; }
        
        function lockGrid() { isGridLocked = true; document.getElementById('grid-lock-overlay').classList.remove('hidden'); disableCocienteInputs(true); document.getElementById('valResiduo').disabled = true; }
        function unlockGrid() { 
            isGridLocked = false; 
            document.getElementById('grid-lock-overlay').classList.add('hidden'); 
            disableCocienteInputs(false); 
            document.getElementById('valResiduo').disabled = false;
            document.getElementById('msg').innerText = "¡Antena completa!"; 
            document.getElementById('msg').style.color = "var(--success)"; 
            triggerEpicEffect(); 
        }

        function triggerEpicEffect() { AudioEngine.playEpic(); const overlay = document.getElementById('epic-overlay'); const text = document.getElementById('epic-text'); const messages = ["¡BOOYAH!", "¡A LA CARGA!", "¡MÁXIMO PODER!"]; text.innerText = messages[Math.floor(Math.random()*messages.length)]; overlay.style.display = 'flex'; text.style.animation = 'none'; void text.offsetWidth; text.style.animation = 'epicPulse 0.5s ease-out forwards'; setTimeout(() => { overlay.style.display = 'none'; }, 1500); }

        function showVictoryScreen() { createConfetti(); document.getElementById('victory-screen').classList.add('show'); AudioEngine.playLevelUp(); }
        function hideVictoryScreen() { document.getElementById('victory-screen').classList.remove('show'); document.querySelectorAll('.confetti').forEach(c => c.remove()); }
        function createConfetti() { const screen = document.getElementById('victory-screen'); const colors = ['#ffcc00', '#00e676', '#2979ff', '#f00', '#ff9800']; for (let i = 0; i < 50; i++) { const conf = document.createElement('div'); conf.className = 'confetti'; conf.style.left = Math.random() * 100 + 'vw'; conf.style.top = -10 + 'px'; conf.style.background = colors[Math.floor(Math.random() * colors.length)]; conf.style.animationDuration = (Math.random() * 2 + 2) + 's'; screen.appendChild(conf); } }
        
        function createUI() {
            const g = document.getElementById('gridContainer'); const dB = document.getElementById('divisorBox'); const tR = document.getElementById('topRow');
            g.innerHTML = ''; dB.innerHTML = ''; tR.innerHTML = '';
            String(currentDivisor).split('').forEach(n => { let i=document.createElement('input'); i.type='text'; i.className='input-div'; i.value=n; i.readOnly=true; dB.appendChild(i); });
            for(let r=0; r<rows; r++) { for(let c=0; c<cols; c++) { let i = document.createElement('input'); i.type='text'; i.className='cell'; i.maxLength=1; i.id="c-"+r+"-"+c; i.addEventListener('input', (e) => { if(!isGridLocked && e.target.value){ let n=(c<cols-1)?"c-"+r+"-"+(c+1):(r<rows-1)?"c-"+(r+1)+"-0":null; if(n)document.getElementById(n).focus(); }}); g.appendChild(i); } }
            let sN = String(currentDividend); for(let i=0; i<sN.length; i++) { let cell = document.getElementById("c-0-"+i); cell.value = sN[i]; cell.classList.add('cell-locked'); cell.disabled = true; }
            document.getElementById('lineH').style.width = (sN.length * cellSize) + 'px';
            for(let i=0; i<sN.length; i++) { 
                let inp = document.createElement('input'); 
                inp.type = 'text'; 
                inp.className = 'input-cociente-galera'; 
                inp.maxLength = 1; 
                inp.id = "top-"+i; 
                inp.addEventListener('input', (e) => { syncT(); if(e.target.value && i<sN.length-1) document.getElementById("top-"+(i+1)).focus(); }); 
                tR.appendChild(inp); 
            }
        }
        function disableCocienteInputs(disabled) { document.querySelectorAll('.input-cociente-galera').forEach(i => i.disabled = disabled); }
        function syncT() { let v=""; document.querySelectorAll('.input-cociente-galera').forEach(x=>v+=x.value); document.getElementById('valCociente').value=v; }

        // --- ANTENA LOGIC ---
        function createAntena() { const b=document.getElementById('antenaBody'); document.getElementById('antenaLabel').innerText=currentDivisor; b.innerHTML=''; for(let i=1;i<=10;i++){ let r=document.createElement('div'); r.className='antena-row locked-row'; r.id="row-"+i; r.innerHTML="<span>"+i+" x "+currentDivisor+" =</span><input type='text' inputmode='numeric' pattern='[0-9]*' class='antena-input' id='a"+i+"' disabled>"; b.appendChild(r); } currentAntennaIndex = 0; enableNextAntennaInput(); }
        function enableNextAntennaInput() { if (currentAntennaIndex >= ANTENNA_SEQUENCE.length) return; const currentId = ANTENNA_SEQUENCE[currentAntennaIndex]; const input = document.getElementById("a"+currentId); const row = document.getElementById("row-"+currentId); if(input) { input.disabled = false; input.focus(); row.classList.remove('locked-row'); input.oninput = (e) => { e.target.value = e.target.value.replace(/[^0-9]/g, ''); checkAntennaInput(input, currentId); }; } }
        function checkAntennaInput(input, id) { const val = parseInt(input.value); const expected = id * currentDivisor; if (val === expected) { AudioEngine.playSuccess(); input.classList.add('status-ok'); input.disabled = true; input.classList.remove('status-wrong'); currentAntennaIndex++; if (currentAntennaIndex < ANTENNA_SEQUENCE.length) { enableNextAntennaInput(); } else { unlockGrid(); } } else { input.classList.add('status-wrong'); setTimeout(() => input.classList.remove('status-wrong'), 500); } }
        function resetAll() { document.getElementById('valCociente').value=''; document.getElementById('valResiduo').value=''; document.querySelectorAll('.antena-input').forEach(i => { i.value=''; i.classList.remove('status-ok','status-wrong'); }); document.querySelectorAll('.input-cociente-galera').forEach(i => i.value=''); document.querySelectorAll('.cell:not(.cell-locked)').forEach(i => { i.value=''; i.disabled=false; }); }
        
        async function verificarSolucion() {
            if(isProcessing) return; if(isGridLocked) { alert("¡Completa la Antena!"); return; }
            isProcessing = true; const btn = document.getElementById('btn-verify'); btn.disabled = true; btn.style.opacity = '0.5'; btn.innerText = "Verificando...";
            let coc=parseInt(document.getElementById('valCociente').value); let res=parseInt(document.getElementById('valResiduo').value)||0;
            let rC=Math.floor(currentDividend/currentDivisor); let rR=currentDividend%currentDivisor;
            
            if(coc===rC && res===rR) {
                totalScore += POINTS; 
                updateUI(); 
                AudioEngine.playSuccess();
                document.getElementById('msg').innerHTML="<span style='color:var(--success); font-weight:700; font-size:1.2rem;'>¡CORRECTO! +"+POINTS+"</span>";
                
                // --- FIX: LÓGICA DE AVANCE ANTES DE GUARDAR ---
                if(currentProblemInLevel < PROBLEMS_PER_LEVEL) {
                    currentProblemInLevel++; 
                } else {
                    if(currentMainLevel < TOTAL_LEVELS) {
                        unlockedLevel = currentMainLevel + 1;
                        currentMainLevel++;
                        currentProblemInLevel = 1;
                        showVictoryScreen();
                    } else {
                        hasFinishedGame = true;
                        const completed_at = new Date().toISOString();
                        await _supabase.from('profiles').update({ completed_at: completed_at }).eq('id', currentUser.id);
                        loadHallOfFame();
                        // Save final state
                        await saveScore();
                        isProcessing = false;
                        return;
                    }
                }
                
                // Guardar estado ACTUALIZADO (Problema siguiente o nivel nuevo)
                await saveScore();
                
                // Esperar un poco si es victoria visual
                if(document.getElementById('victory-screen').classList.contains('show')) {
                     setTimeout(() => {
                        hideVictoryScreen();
                        loadProblem();
                        isProcessing = false;
                     }, 3000);
                } else {
                    loadProblem();
                    isProcessing = false;
                }
            } else { 
                AudioEngine.playError(); document.getElementById('msg').innerHTML="<span style='color:var(--error); font-weight:700; font-size:1.2rem;'>INCORRECTO</span>";
                isProcessing = false; btn.disabled = false; btn.style.opacity = '1'; btn.innerText = "Verificar";
            }
        }
    </script>
</body>
</html>
