<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto de División - Antena Progresiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #ffcc00; --primary-light: #ff9800; --text-dark: #e0e0e0;
            --bg-dark: #0f0f0f; --bg-panel: #1a1a1a; --bg-input: #2a2a2a;
            --success: #00e676; --error: #ff1744; --cell-size: 45px;
            --rank-iron: #9e9e9e; --rank-bronze: #d97706; --rank-silver: #bdbdbd;
            --rank-gold: #fbbf24; --rank-platinum: #00bcd4; --rank-diamond: #7c4dff; --rank-heroic: #ff1744;
        }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background-color: var(--bg-dark); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .main-header { width: 100%; background: linear-gradient(90deg, #000000, #1a1a1a); color: var(--primary-color); padding: 15px 0; text-align: center; box-shadow: 0 4px 20px rgba(255, 204, 0, 0.2); border-bottom: 2px solid var(--primary-color); }
        .main-header h1 { margin: 0; font-size: 2.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-family: 'Teko', sans-serif; }
        .app-container { width: 100%; max-width: 1500px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }

        .panel { background: var(--bg-panel); padding: 15px 25px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid #333; }
        .level-select { padding: 8px 12px; border-radius: 2px; border: 1px solid var(--primary-color); background: black; color: var(--primary-color); font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; outline: none; text-transform: uppercase; }
        
        .avatar-container { width: 60px; height: 60px; border-radius: 50%; overflow: hidden; border: 2px solid var(--primary-color); background-color: #000; position: relative; box-shadow: 0 0 10px var(--primary-color); flex-shrink: 0; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; background-color: black; }
        
        .avatar-iron { border-color: var(--rank-iron); box-shadow: 0 0 5px var(--rank-iron); }
        .avatar-bronze { border-color: var(--rank-bronze); box-shadow: 0 0 8px var(--rank-bronze); }
        .avatar-silver { border-color: var(--rank-silver); box-shadow: 0 0 8px var(--rank-silver); }
        .avatar-gold { border-color: var(--rank-gold); box-shadow: 0 0 15px var(--rank-gold); background: rgba(251, 191, 36, 0.1); }
        .avatar-platinum { border-color: var(--rank-platinum); box-shadow: 0 0 15px var(--rank-platinum); }
        .avatar-diamond { border-color: var(--rank-diamond); box-shadow: 0 0 15px var(--rank-diamond); background: rgba(124, 77, 255, 0.1); }
        .avatar-heroic { border-color: var(--rank-heroic); box-shadow: 0 0 20px var(--rank-heroic); background: rgba(255, 23, 68, 0.1); animation: heroPulse 2s infinite; }
        @keyframes heroPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 23, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); } }

        .user-info-panel { display: flex; align-items: center; gap: 15px; }
        .user-stats { display: flex; flex-direction: column; align-items: flex-start; }
        .rank-box { display: flex; flex-direction: column; align-items: center; background: black; padding: 5px 15px; border-radius: 4px; border: 1px solid #444; min-width: 120px; }
        .rank-name { font-size: 1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .rank-progress { width: 100%; height: 4px; background: #333; border-radius: 0; margin-top: 4px; overflow: hidden; }
        .rank-progress-bar { height: 100%; transition: width 0.5s; background: var(--text-dark); }
        .rank-score-label { font-size: 0.8rem; color: #888; margin-top: 2px; }

        .progress-bar-container { flex-grow: 1; margin: 0 20px; height: 12px; background: #333; border-radius: 0; overflow: hidden; min-width: 100px; }
        .progress-bar-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--success); }

        .main-layout { display: flex; flex-direction: row; gap: 20px; width: 100%; align-items: flex-start; flex-wrap: wrap; }
        .game-area { flex: 3; display: flex; flex-direction: column; gap: 20px; min-width: 300px; }
        .workspace-card { background: var(--bg-panel); padding: 30px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; gap: 40px; justify-content: flex-start; align-items: flex-start; overflow-x: auto; width: 100%; box-sizing: border-box; border: 1px solid #333; }

        .ranking-sidebar { flex: 1; background: var(--bg-panel); padding: 20px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 280px; border: 1px solid #333; }
        .ranking-title { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 15px; text-transform: uppercase; font-family: 'Teko', sans-serif; }
        .ranking-list { list-style: none; padding: 0; margin: 0; }
        .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-left: 4px solid #333; transition: all 0.3s; }
        
        .rank-row { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .list-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #333; flex-shrink: 0; }
        
        .rank-iron { color: var(--rank-iron); border-color: var(--rank-iron); }
        .rank-bronze { color: var(--rank-bronze); border-color: var(--rank-bronze); background: rgba(217, 119, 6, 0.1); }
        .rank-silver { color: var(--rank-silver); border-color: var(--rank-silver); }
        .rank-gold { color: var(--rank-gold); border-color: var(--rank-gold); background: rgba(251, 191, 36, 0.1); }
        .rank-platinum { color: var(--rank-platinum); border-color: var(--rank-platinum); background: rgba(0, 188, 212, 0.1); }
        .rank-diamond { color: var(--rank-diamond); border-color: var(--rank-diamond); background: rgba(124, 77, 255, 0.1); }
        .rank-heroic { color: var(--rank-heroic); border-color: var(--rank-heroic); background: rgba(255, 23, 68, 0.1); }
        
        .rank-pos { font-weight: 700; color: #666; margin-right: 5px; width: 20px; font-size: 1rem; }
        .rank-info { flex-grow: 1; display: flex; flex-direction: column; }
        .rank-name-list { font-weight: 600; font-size: 0.95rem; }
        .rank-tier-list { font-size: 0.75rem; font-weight: 700; opacity: 0.8; }
        .rank-score { font-weight: 700; color: var(--primary-color); margin-left: 10px; font-size: 0.9rem; text-shadow: 0 0 5px var(--primary-color); }

        .division-row { display: flex; flex-direction: row; align-items: flex-start; gap: 0; margin-top: 20px; flex-shrink: 0; }
        .col-divisor { display: flex; flex-direction: row; align-items: center; height: var(--cell-size); margin-top: 49px; }
        .input-div { width: var(--cell-size); height: var(--cell-size); border: 1px solid #555; background: black; font-size: 2rem; font-weight: 700; color: var(--primary-color); text-align: center; outline: none; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; text-shadow: 0 0 5px var(--primary-color); }
        .col-linea-v { width: 3px; height: var(--cell-size); background-color: var(--primary-color); margin-top: 49px; box-shadow: 0 0 8px var(--primary-color); }
        .col-grid { display: flex; flex-direction: column; position: relative; }
        .fila-cociente { display: flex; justify-content: flex-start; height: var(--cell-size); align-items: center; margin-bottom: 4px; }
        .input-cociente { width: var(--cell-size); height: var(--cell-size); border: none; border-bottom: 2px solid #444; background: transparent; font-size: 1.8rem; font-weight: 700; color: var(--primary-color); text-align: center; outline: none; font-family: 'Rajdhani', sans-serif; }
        .input-cociente:focus { background: rgba(255, 204, 0, 0.1); border-color: var(--primary-color); }
        .linea-h { height: 3px; background-color: var(--primary-color); width: 100%; margin-bottom: 1px; box-shadow: 0 0 8px var(--primary-color); }

        .excel-toolbar { position: absolute; top: -40px; left: 0; background: #000; border: 1px solid #333; border-radius: 0; padding: 4px; display: flex; gap: 2px; z-index: 100; }
        .tool-btn { width: 32px; height: 32px; background: transparent; cursor: pointer; color: #666; border: none; display: flex; align-items: center; justify-content: center; }
        .tool-btn:hover { background: #333; color: var(--primary-color); }
        .tool-btn.active { background: var(--primary-color); color: black; }

        .grid-matriz { display: grid; grid-template-columns: repeat(9, var(--cell-size)); grid-template-rows: repeat(15, var(--cell-size)); background-color: #2a2a2a; border: 1px solid #444; }
        .cell { width: var(--cell-size); height: var(--cell-size); background-color: #1a1a1a; border: 1px solid #333; text-align: center; font-size: 1.4rem; font-weight: 600; outline: none; cursor: text; box-sizing: border-box; color: white; transition: background 0.2s; }
        .cell:focus { background: #333; box-shadow: inset 0 0 10px var(--primary-color); }
        .cell-locked { background: #000; font-weight: 700; color: var(--primary-color); border-color: #333; }
        .cell-selected { background-color: rgba(255, 204, 0, 0.2) !important; border-color: var(--primary-color) !important; }
        .border-bottom { border-bottom: 2px solid var(--primary-color) !important; }
        .border-right { border-right: 2px solid var(--primary-color) !important; }

        .grid-disabled-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 50; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: opacity 0.3s; }
        .grid-disabled-overlay.hidden { display: none; }
        .lock-msg { background: var(--primary-color); color: black; padding: 10px 20px; border-radius: 2px; font-size: 1rem; font-weight: 700; box-shadow: 0 0 20px var(--primary-color); pointer-events: auto; text-align: center; text-transform: uppercase; }
        
        /* ANTENA & PROGRESSIVE LOCK */
        .antena-panel { background: var(--bg-panel); border: 1px solid #333; padding: 15px; border-radius: 4px; border-top: 4px solid var(--primary-color); width: 260px; flex-shrink: 0; }
        .antena-header { text-align: center; font-weight: 700; color: var(--primary-color); margin-bottom: 15px; font-size: 1.2rem; text-transform: uppercase; font-family: 'Teko', sans-serif; letter-spacing: 1px; }
        .antena-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; opacity: 1; transition: opacity 0.3s; }
        .antena-row.locked-row { opacity: 0.4; } /* Visual cue for locked rows */
        
        .antena-input { width: 60px; height: 30px; font-size: 1rem; font-weight: 600; text-align: center; border: 1px solid #444; border-radius: 2px; background: black; color: white; }
        .antena-input:disabled { background: #111; color: #555; border-color: #222; cursor: not-allowed; } /* Disabled state */
        .antena-input:focus { border-color: var(--primary-color); }
        .status-ok { background-color: rgba(0, 230, 118, 0.2) !important; border-color: var(--success) !important; color: var(--success); }
        .status-wrong { background-color: rgba(255, 23, 68, 0.2) !important; border-color: var(--error) !important; color: var(--error); }

        .controls { background: black; padding: 20px; border-radius: 4px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; width: 100%; box-sizing: border-box; }
        .result-box { display: flex; flex-direction: column; background: #1a1a1a; padding: 8px 15px; border-radius: 2px; border: 1px solid #333; }
        .result-input { border: none; font-size: 1.8rem; font-weight: 700; width: 80px; text-align: center; color: var(--primary-color); background: transparent; font-family: 'Teko', sans-serif; }
        button { border: none; padding: 10px 24px; font-weight: 600; border-radius: 2px; cursor: pointer; font-size: 1.1rem; color: black; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; transition: all 0.2s; }
        .btn-primary { background: var(--primary-color); box-shadow: 0 0 15px var(--primary-color); }
        .btn-primary:hover { background: white; box-shadow: 0 0 20px white; }
        .btn-check { background: var(--success); box-shadow: 0 0 15px var(--success); color: black; }
        .btn-small { font-size: 0.9rem; padding: 5px 10px; background: #333; color: #ccc; border: 1px solid #555; box-shadow: none; }
        .btn-small:hover { border-color: #888; color: white; }
        #msg { width: 100%; text-align: center; font-weight: 600; margin-top: 10px; font-size: 1.1rem; }

        /* VICTORY SCREEN */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 99999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #victory-screen.show { display: flex; }
        .victory-title { font-size: 7rem; color: var(--primary-color); font-weight: 700; text-shadow: 0 0 30px var(--primary-color); font-family: 'Teko', sans-serif; letter-spacing: 4px; margin-bottom: 10px; animation: scaleUp 0.3s; text-transform: uppercase; }
        .victory-sub { font-size: 2rem; color: #888; font-weight: 600; animation: fadeInUp 0.5s 0.2s backwards; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; }
        .victory-level { font-size: 4rem; color: white; font-weight: 700; margin: 20px 0; animation: zoomIn 0.8s 0.4s backwards; background: black; padding: 5px 40px; border: 2px solid var(--primary-color); box-shadow: 0 0 20px var(--primary-color); font-family: 'Teko', sans-serif; }
        .confetti { position: absolute; width: 10px; height: 10px; background: #f00; animation: fall linear forwards; }

        @keyframes scaleUp { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeInUp { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes zoomIn { 0% { transform: scale(0) rotate(-10deg); } 100% { transform: scale(1) rotate(0); } }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        /* Modals Dark */
        #login-screen, #avatar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: var(--bg-panel); padding: 40px; border-radius: 4px; box-shadow: 0 0 30px rgba(255, 204, 0, 0.1); text-align: center; width: 350px; border: 1px solid #333; }
        .login-box h2 { color: var(--primary-color); margin-top: 0; margin-bottom: 5px; font-family: 'Teko', sans-serif; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 2px; font-size: 1rem; box-sizing: border-box; background: black; color: white; font-family: 'Rajdhani', sans-serif; }
        .login-btn { width: 100%; margin-top: 10px; }
        .login-error { color: var(--error); font-size: 0.9rem; margin-top: 10px; display: none; }
        .login-avatar-preview { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 20px auto; border: 2px solid var(--primary-color); overflow: hidden; background: black; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--primary-color); }
        .login-avatar-preview img { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 0.3s; }

        .modal-box { background: var(--bg-panel); padding: 30px; border-radius: 4px; width: 450px; max-height: 80vh; overflow-y: auto; text-align: center; border: 1px solid #333; }
        .modal-section { margin-bottom: 20px; }
        .modal-section h4 { margin: 0 0 10px 0; color: #888; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .avatar-option { cursor: pointer; padding: 5px; border-radius: 50%; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .avatar-option:hover { border-color: #555; }
        .avatar-option.selected { border-color: var(--primary-color); background: rgba(255, 204, 0, 0.1); }
        .avatar-option img { width: 50px; height: 50px; border-radius: 50%; background: #000; }
        .avatar-locked { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; }
        .lock-icon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); border-radius: 50%; color: #666; font-size: 1.2rem; pointer-events: none; }

        @media (max-width: 900px) { .main-layout { flex-direction: column; } .ranking-sidebar { width: 100%; } .workspace-card { flex-wrap: wrap; justify-content: center; } .victory-title { font-size: 3.5rem; } .victory-level { font-size: 2rem; } }
    </style>
</head>
<body>

    <div id="victory-screen">
        <div class="victory-title">NIVEL COMPLETADO</div>
        <div class="victory-sub">Preparando siguiente reto...</div>
        <div class="victory-level" id="victory-level-display">NIVEL 2</div>
    </div>

    <div id="login-screen" style="display:none;">
        <div class="login-box">
            <div class="login-avatar-preview"><img id="login-avatar-img" src="https://api.dicebear.com/8.x/identicon/svg?seed=Shadow" alt="Avatar"></div>
            <h2>Reto de División</h2>
            <p style="margin-bottom: 20px; color:#888;">Ingresa tu usuario</p>
            <input type="text" id="login-username" class="login-input" placeholder="Usuario">
            <input type="password" id="login-password" class="login-input" placeholder="Contraseña">
            <button class="login-btn btn-primary" onclick="handleLogin()">Iniciar Sesión</button>
            <button class="login-btn btn-check" onclick="handleRegister()" style="margin-top:5px; background:#333; color:#ccc;">Registrarse</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>

    <div id="avatar-modal" style="display:none; background: rgba(0,0,0,0.9);" onclick="if(event.target.id === 'avatar-modal') toggleAvatarModal()">
        <div class="modal-box">
            <h3 style="margin:0 0 10px 0; color:var(--primary-color); font-family:'Teko'; font-size:1.8rem; text-transform:uppercase;">Personaje</h3>
            <p style="font-size:0.9rem; color:#666;">Selecciona tu estilo</p>
            <div class="modal-section"><h4>Estándar</h4><div class="avatar-grid" id="avatar-options-standard"></div></div>
            <div class="modal-section" id="exclusive-section" style="display:none;"><h4 style="color:var(--error);"> <i class="fas fa-lock-open"></i> Exclusivos Heroico</h4><div class="avatar-grid" id="avatar-options-exclusive"></div></div>
            <button class="btn-primary" onclick="saveAvatarChoice()">Guardar</button>
        </div>
    </div>

    <header class="main-header">
        <h1>Prof. Miguel</h1>
        <span style="color:#888; font-size:0.9rem;">Reto de División</span>
    </header>

    <div class="app-container">
        <div class="panel">
            <div>
                <label style="font-weight: 600; color: #888;">Nivel:</label>
                <select id="levelSelect" class="level-select" onchange="jumpToLevel(this.value)">
                    <option value="1">Nivel 1</option><option value="2">Nivel 2</option><option value="3">Nivel 3</option>
                    <option value="4">Nivel 4</option><option value="5">Nivel 5</option><option value="6">Nivel 6</option>
                    <option value="7">Nivel 7</option><option value="8">Nivel 8</option><option value="9">Nivel 9</option>
                    <option value="10">Nivel 10</option>
                </select>
            </div>
            <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>
            
            <div class="user-info-panel">
                <div class="avatar-container" id="main-avatar-box" onclick="toggleAvatarModal()" title="Cambiar Avatar" style="cursor: pointer;"><img id="main-avatar-img" class="avatar-img" src="" alt="Avatar"></div>
                <div class="user-stats">
                     <div style="font-size: 0.8rem; color: #888;" id="difficultyLabel">...</div>
                     <div style="font-size: 0.9rem; color:#aaa;">Ej. <span id="subLevelCount">1</span>/10</div>
                </div>
                <div class="rank-box" id="userRankBox">
                    <div class="rank-name" id="userRankName">...</div>
                    <div class="rank-progress"><div class="rank-progress-bar" id="userRankBar" style="width: 0%"></div></div>
                    <div class="rank-score-label"><span id="scoreDisplay">0</span> pts</div>
                </div>
                <button onclick="logout()" class="btn-small">Salir</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="game-area">
                <div class="workspace-card">
                    <div class="division-row">
                        <div class="col-divisor" id="divisorBox"></div>
                        <div class="col-linea-v"></div>
                        <div class="col-grid" id="grid-wrapper">
                            <div class="grid-disabled-overlay" id="grid-lock-overlay"><div class="lock-msg"><i class="fas fa-lock"></i> ¡Completa la Antena!</div></div>
                            <div class="excel-toolbar">
                                <button class="tool-btn" id="btnSelectMode" onclick="toggleSelectMode()"><i class="fas fa-mouse-pointer"></i></button>
                                <button class="tool-btn" onclick="applyBorder('bottom')"><i class="fas fa-ellipsis-h"></i></button>
                                <button class="tool-btn" onclick="applyBorder('right')"><i class="fas fa-ellipsis-v"></i></button>
                                <button class="tool-btn" onclick="applyBorder('clear')"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="fila-cociente" id="topRow"></div>
                            <div class="linea-h" id="lineH"></div>
                            <div class="grid-matriz" id="gridContainer"></div>
                        </div>
                    </div>
                    <div class="antena-panel">
                        <div class="antena-header">Antena (x <span id="antenaLabel">...</span>)</div>
                        <div id="antenaBody"></div>
                        <!-- Botón Validar eliminado para flujo automático, o mantener para help? Se deja oculto o se adapta -->
                    </div>
                </div>
                <div class="controls">
                    <div style="display:flex; gap:15px;">
                        <div class="result-box"><span style="font-size:0.8rem; color: #666; font-weight:600;">Cociente</span><input type="number" class="result-input" id="valCociente" placeholder="0"></div>

                totalScore+=POINTS; updateUI(); await saveScore();
                AudioEngine.playSuccess();
                document.getElementById('msg').innerHTML="<span style='color:var(--success); font-weight:700; font-size:1.2rem;'>¡CORRECTO! +"+POINTS+"</span>";
                setTimeout(() => {
                    if(currentProblemInLevel<PROBLEMS_PER_LEVEL) currentProblemInLevel++;
                    else {
                        if(currentMainLevel < TOTAL_LEVELS) { let nextLvl = currentMainLevel + 1; showVictoryScreen(nextLvl); }
                        else { alert("¡JUEGO TERMINADO!"); currentMainLevel = 1; currentProblemInLevel = 1; totalScore = 0; updateUI(); loadProblem(); }
                    }
                    if(currentProblemInLevel > 1 || currentMainLevel > 1) loadProblem();
                }, 1500);
            } else { 
                AudioEngine.playError();
                document.getElementById('msg').innerHTML="<span style='color:var(--error); font-weight:700; font-size:1.2rem;'>INCORRECTO</span>"; 
            }
        }
    </script>
</body>
</html>
