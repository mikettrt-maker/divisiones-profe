<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prof. Miguel - Gamer Edition V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #311b92; --primary-light: #673ab7; --text-dark: #1f2937;
            --success: #10b981; --error: #ef4444; --cell-size: 45px;
            --rank-iron: #6b7280; --rank-bronze: #d97706; --rank-silver: #64748b;
            --rank-gold: #fbbf24; --rank-platinum: #06b6d4; --rank-diamond: #8b5cf6; --rank-heroic: #ef4444;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #f3f4f6; color: var(--text-dark); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .main-header { width: 100%; background: linear-gradient(90deg, var(--primary-color), var(--primary-light)); color: white; padding: 15px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .main-header h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        .app-container { width: 100%; max-width: 1500px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }

        .panel { background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .level-select { padding: 8px 12px; border-radius: 20px; border: 2px solid var(--primary-color); background: white; color: var(--primary-color); font-family: 'Poppins'; font-weight: 700; cursor: pointer; outline: none; }
        
        /* AVATAR SYSTEM */
        .avatar-container {
            width: 60px; height: 60px;
            border-radius: 50%; overflow: hidden;
            border: 3px solid #e5e7eb;
            background-color: #e5e7eb;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; background-color: white; }
        
        /* Rank Borders */
        .avatar-iron { border-color: var(--rank-iron); background-color: #f3f4f6; }
        .avatar-bronze { border-color: var(--rank-bronze); background-color: #fff7ed; }
        .avatar-silver { border-color: var(--rank-silver); background-color: #f8fafc; }
        .avatar-gold { border-color: var(--rank-gold); background-color: #fffbeb; box-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .avatar-platinum { border-color: var(--rank-platinum); background-color: #ecfeff; }
        .avatar-diamond { border-color: var(--rank-diamond); background-color: #f5f3ff; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
        .avatar-heroic { 
            border-color: var(--rank-heroic); background-color: #fef2f2; 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            animation: heroPulse 2s infinite;
        }
        @keyframes heroPulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .user-info-panel { display: flex; align-items: center; gap: 15px; }
        .user-stats { display: flex; flex-direction: column; align-items: flex-start; }
        .rank-box { display: flex; flex-direction: column; align-items: center; background: #f8fafc; padding: 5px 15px; border-radius: 12px; border: 2px solid #e2e8f0; min-width: 120px; }
        .rank-name { font-size: 1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .rank-progress { width: 100%; height: 4px; background: #e2e8f0; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .rank-progress-bar { height: 100%; transition: width 0.5s; background: var(--text-dark); }
        .rank-score-label { font-size: 0.8rem; color: #666; margin-top: 2px; }

        .progress-bar-container { flex-grow: 1; margin: 0 20px; height: 12px; background: #e5e7eb; border-radius: 6px; overflow: hidden; min-width: 100px; }
        .progress-bar-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }

        .main-layout { display: flex; flex-direction: row; gap: 20px; width: 100%; align-items: flex-start; flex-wrap: wrap; }
        .game-area { flex: 3; display: flex; flex-direction: column; gap: 20px; min-width: 300px; }
        .workspace-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; gap: 40px; justify-content: flex-start; align-items: flex-start; overflow-x: auto; width: 100%; box-sizing: border-box; }

        .ranking-sidebar { flex: 1; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); min-width: 280px; }
        .ranking-title { font-size: 1.3rem; font-weight: 800; color: var(--text-dark); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .ranking-list { list-style: none; padding: 0; margin: 0; }
        .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 8px; border-radius: 8px; background: #f8fafc; border-left: 5px solid #cbd5e1; }
        
        .rank-row { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .list-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #e5e7eb; flex-shrink: 0; }
        
        .rank-iron { color: var(--rank-iron); border-color: var(--rank-iron); }
        .rank-bronze { color: var(--rank-bronze); border-color: var(--rank-bronze); background: #fff7ed; }
        .rank-silver { color: var(--rank-silver); border-color: var(--rank-silver); }
        .rank-gold { color: #92400e; border-color: var(--rank-gold); background: #fffbeb; font-weight: 800; }
        .rank-platinum { color: #0e7490; border-color: var(--rank-platinum); background: #ecfeff; font-weight: 800; }
        .rank-diamond { color: #6d28d9; border-color: var(--rank-diamond); background: #f5f3ff; font-weight: 800; }
        .rank-heroic { color: #b91c1c; border-color: var(--rank-heroic); background: #fef2f2; font-weight: 900; }
        
        .rank-pos { font-weight: 800; color: #666; margin-right: 5px; width: 20px; font-size: 0.9rem; }
        .rank-info { flex-grow: 1; display: flex; flex-direction: column; }
        .rank-name-list { font-weight: 700; font-size: 0.9rem; }
        .rank-tier-list { font-size: 0.7rem; font-weight: 800; opacity: 0.9; }
        .rank-score { font-weight: 700; color: var(--primary-light); margin-left: 10px; font-size: 0.9rem; }

        .division-row { display: flex; flex-direction: row; align-items: flex-start; gap: 0; margin-top: 20px; flex-shrink: 0; }
        .col-divisor { display: flex; flex-direction: row; align-items: center; height: var(--cell-size); margin-top: 49px; }
        .input-div { width: var(--cell-size); height: var(--cell-size); border: 1px solid #ccc; background: #fafafa; font-size: 2rem; font-weight: 700; color: var(--primary-color); text-align: center; outline: none; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; }
        .col-linea-v { width: 4px; height: var(--cell-size); background-color: var(--text-dark); margin-top: 49px; }
        .col-grid { display: flex; flex-direction: column; position: relative; }
        .fila-cociente { display: flex; justify-content: flex-start; height: var(--cell-size); align-items: center; margin-bottom: 4px; }
        .input-cociente { width: var(--cell-size); height: var(--cell-size); border: none; border-bottom: 2px solid #eee; background: transparent; font-size: 1.8rem; font-weight: 700; color: var(--primary-color); text-align: center; outline: none; }
        .linea-h { height: 4px; background-color: var(--text-dark); width: 100%; margin-bottom: 1px; }

        .excel-toolbar { position: absolute; top: -40px; left: 0; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; padding: 4px; display: flex; gap: 2px; z-index: 100; }
        .tool-btn { width: 32px; height: 32px; background: transparent; cursor: pointer; border-radius: 4px; color: #475569; border: none; display: flex; align-items: center; justify-content: center; }
        .tool-btn:hover { background: #e2e8f0; }
        .tool-btn.active { background: #bfdbfe; color: var(--primary-color); }

        .grid-matriz { display: grid; grid-template-columns: repeat(9, var(--cell-size)); grid-template-rows: repeat(8, var(--cell-size)); background-color: #e5e7eb; }
        .cell { width: var(--cell-size); height: var(--cell-size); background-color: white; border: 1px solid #d1d5db; text-align: center; font-size: 1.4rem; font-weight: 600; outline: none; cursor: text; box-sizing: border-box; }
        .cell:focus { background: #e1f5fe; }
        .cell-locked { background: #eceff1; font-weight: 700; cursor: default; }
        .cell-selected { background-color: #dbeafe !important; }
        .border-bottom { border-bottom: 3px solid var(--text-dark) !important; }
        .border-right { border-right: 3px solid var(--text-dark) !important; }

        .antena-panel { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; border-top: 5px solid var(--primary-color); width: 260px; flex-shrink: 0; }
        .antena-header { text-align: center; font-weight: 700; color: var(--primary-color); margin-bottom: 10px; font-size: 1.1rem; }
        .antena-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .antena-input { width: 60px; height: 30px; font-size: 0.9rem; font-weight: 600; text-align: center; border: 1px solid #cbd5e1; border-radius: 4px; }
        .status-ok { background-color: #dcfce7 !important; border-color: var(--success) !important; }
        .status-wrong { background-color: #fee2e2 !important; border-color: var(--error) !important; }

        .controls { background: #eff6ff; padding: 20px; border-radius: 12px; border: 1px solid #bfdbfe; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; width: 100%; box-sizing: border-box; }
        .result-box { display: flex; flex-direction: column; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid #bfdbfe; }
        .result-input { border: none; font-size: 1.5rem; font-weight: 700; width: 80px; text-align: center; color: var(--primary-color); }
        button { border: none; padding: 12px 24px; font-weight: 600; border-radius: 8px; cursor: pointer; font-size: 1rem; color: white; }
        .btn-primary { background: var(--primary-color); }
        .btn-check { background: var(--success); }
        .btn-small { font-size: 0.8rem; padding: 5px 10px; background: #aaa; }
        #msg { width: 100%; text-align: center; font-weight: 600; margin-top: 10px; }

        /* Modals */
        #login-screen, #avatar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; width: 350px; }
        .login-box h2 { color: var(--primary-color); margin-top: 0; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .login-btn { width: 100%; margin-top: 10px; }
        .login-error { color: var(--error); font-size: 0.9rem; margin-top: 10px; display: none; }

        .modal-box { background: white; padding: 30px; border-radius: 15px; width: 450px; max-height: 80vh; overflow-y: auto; text-align: center; }
        .modal-section { margin-bottom: 20px; }
        .modal-section h4 { margin: 0 0 10px 0; color: var(--text-dark); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .avatar-option { cursor: pointer; padding: 5px; border-radius: 50%; border: 3px solid transparent; transition: 0.2s; position: relative; }
        .avatar-option:hover { border-color: #bfdbfe; }
        .avatar-option.selected { border-color: var(--primary-color); background-color: #f0f0ff; }
        .avatar-option img { width: 50px; height: 50px; border-radius: 50%; background: #eee; }
        
        .avatar-locked { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; }
        .lock-icon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.7); border-radius: 50%; color: #333; font-size: 1.2rem; pointer-events: none; }

        @media (max-width: 900px) { .main-layout { flex-direction: column; } .ranking-sidebar { width: 100%; } .workspace-card { flex-wrap: wrap; justify-content: center; } }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" style="display:none;">
        <div class="login-box">
            <h2>Prof. Miguel</h2>
            <p>Ingresa tu usuario</p>

            <input type="password" id="login-password" class="login-input" placeholder="Contraseña">
            <button class="login-btn btn-primary" onclick="handleLogin()">Iniciar Sesión</button>
            <button class="login-btn btn-check" onclick="handleRegister()" style="margin-top:5px; background:#666;">Registrarse</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>

    <!-- AVATAR MODAL -->

            <h3 style="margin:0 0 10px 0; color:var(--primary-color);">Personaje</h3>
            <p style="font-size:0.9rem; color:#666;">Selecciona tu estilo</p>

            <div class="modal-section">
                <h4>Estándar</h4>
                <div class="avatar-grid" id="avatar-options-standard"></div>
            </div>

            <!-- Exclusive Styles -->
            <div class="modal-section" id="exclusive-section" style="display:none;">
                <h4 style="color:#ef4444;"> <i class="fas fa-lock-open"></i> Exclusivos Rango Heroico</h4>
                <div class="avatar-grid" id="avatar-options-exclusive"></div>
            </div>

            <button class="btn-primary" onclick="saveAvatarChoice()">Guardar</button>
        </div>
    </div>

    <header class="main-header">
        <h1>Prof. Miguel</h1>
        <span>Reto de División</span>
    </header>

    <div class="app-container">
        <div class="panel">
            <div>
                <label style="font-weight: 600; color: #555;">Nivel:</label>
                <select id="levelSelect" class="level-select" onchange="jumpToLevel(this.value)">
                    <option value="1">Nivel 1</option><option value="2">Nivel 2</option><option value="3">Nivel 3</option>

                    <option value="7">Nivel 7</option><option value="8">Nivel 8</option><option value="9">Nivel 9</option>
                    <option value="10">Nivel 10</option>
                </select>
            </div>
            <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>
            
            <div class="user-info-panel">

                    <img id="main-avatar-img" class="avatar-img" src="" alt="Avatar">

                    <div class="rank-score-label"><span id="scoreDisplay">0</span> pts</div>
                </div>
                <button onclick="logout()" class="btn-small">Salir</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="game-area">
                <div class="workspace-card">
                    <div class="division-row">
                        <div class="col-divisor" id="divisorBox"></div>
                        <div class="col-linea-v"></div>
                        <div class="col-grid">
                            <div class="excel-toolbar">

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session && session.user) { currentUser = session.user; showApp(); } 
                else { showLogin(); }
            } catch(e) { console.error(e); showLogin(); }
        });

        function showLogin() { document.getElementById('login-screen').style.display = 'flex'; document.querySelector('.app-container').style.display = 'none'; }
        
        async function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.querySelector('.app-container').style.display = 'flex';
            if(currentUser) { try { await loadScore(currentUser); } catch(e){ console.error(e); } }
            initGame();
            startRanking();
        }

        async function handleLogin() {
            const u = document.getElementById('login-username').value.trim();
            const p = document.getElementById('login-password').value;
            const e = document.getElementById('login-error');
            if (!u || p.length < 6) { e.textContent = "Datos incompletos."; e.style.display='block'; return; }
            try {
                const { data, error } = await _supabase.auth.signInWithPassword({ email: u+"@profemiguel.com", password: p });
                if (error) throw error;
                currentUser = data.user;
                showApp();
            } catch (err) { e.textContent = "Error: " + err.message; e.style.display='block'; }
        }

        async function handleRegister() {
            const u = document.getElementById('login-username').value.trim();
            const p = document.getElementById('login-password').value;
            const e = document.getElementById('login-error');
            if (!u || p.length < 6) { e.textContent = "Datos incompletos."; e.style.display='block'; return; }
            try {
                const { data, error } = await _supabase.auth.signUp({ email: u+"@profemiguel.com", password: p });
                if (error) throw error;
                alert("Registrado. Entra ahora.");
            } catch (err) { e.textContent = "Error: " + err.message; e.style.display='block'; }
        }

        async function logout() { await _supabase.auth.signOut(); currentUser=null; totalScore=0; showLogin(); clearInterval(rankInt); }

        async function loadScore(user) {
            try {
                const { data } = await _supabase.from('profiles').select('total_score, avatar_style').eq('id', user.id).single();
                totalScore = (data && data.total_score) ? data.total_score : 0;
                currentAvatarStyle = (data && data.avatar_style) ? data.avatar_style : 'adventurer';
            } catch(e) { totalScore = 0; currentAvatarStyle = 'adventurer'; }
            updateUI();
            renderMainAvatar();
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = totalScore;
            const rI = getRankInfo(totalScore);
            document.getElementById('userRankName').innerText = rI.icon + " " + rI.name + " " + rI.tier;
            document.getElementById('userRankName').className = "rank-name " + rI.css;
            document.getElementById('userRankBar').style.width = rI.pct + "%";
            let c = getComputedStyle(document.documentElement).getPropertyValue('--' + rI.css);
            document.getElementById('userRankBar').style.background = c;
            
            const avatarBox = document.getElementById('main-avatar-box');
            avatarBox.className = "avatar-container " + rI.avatar;
        }

        // --- AVATAR SYSTEM LOGIC ---
        function getAvatarUrl(seed, style) {
            return `https://api.dicebear.com/8.x/${style}/svg?seed=${seed}`;
        }

        function renderMainAvatar() {
            const img = document.getElementById('main-avatar-img');
            img.src = getAvatarUrl(currentUser.email.split('@')[0], currentAvatarStyle);
        }

        function toggleAvatarModal() {
            const modal = document.getElementById('avatar-modal');
            if(modal.style.display === 'none') {
                modal.style.display = 'flex';
                renderAvatarOptions();
            } else {
                modal.style.display = 'none';
            }
        }

        function renderAvatarOptions() {
            const gridStandard = document.getElementById('avatar-options-standard');
            const gridExclusive = document.getElementById('avatar-options-exclusive');
            const exclusiveSection = document.getElementById('exclusive-section');
            
            gridStandard.innerHTML = '';
            gridExclusive.innerHTML = '';
            
            const seed = currentUser.email.split('@')[0];
            const isHeroic = totalScore >= 50000;

            // Render Standard
            AVATAR_STYLES_STANDARD.forEach(style => {
                let div = document.createElement('div');
                div.className = 'avatar-option' + (currentAvatarStyle === style.id ? ' selected' : '');
                div.onclick = () => selectAvatarStyle(style.id);
                div.innerHTML = `<img src="${getAvatarUrl(seed, style.id)}"><span style="font-size:0.7rem; font-weight:600; display:block;">${style.name}</span>`;
                gridStandard.appendChild(div);
            });

            // Render Exclusive (Locked/Unlocked)
            if(isHeroic) {
                exclusiveSection.style.display = 'block';
                AVATAR_STYLES_EXCLUSIVE.forEach(style => {
                    let div = document.createElement('div');
                    div.className = 'avatar-option' + (currentAvatarStyle === style.id ? ' selected' : '');
                    div.onclick = () => selectAvatarStyle(style.id);
                    div.innerHTML = `<img src="${getAvatarUrl(seed, style.id)}"><span style="font-size:0.7rem; font-weight:600; display:block;">${style.name}</span>`;
                    gridExclusive.appendChild(div);
                });
            } else {
                exclusiveSection.style.display = 'block'; 
                // Show locked examples
                AVATAR_STYLES_EXCLUSIVE.forEach(style => {
                    let div = document.createElement('div');
                    div.className = 'avatar-option avatar-locked';
                    div.innerHTML = `
                        <img src="${getAvatarUrl('demo', style.id)}">
                        <div class="lock-icon"><i class="fas fa-lock"></i></div>
                        <span style="font-size:0.7rem; font-weight:600; display:block;">${style.name}</span>
                    `;
                    gridExclusive.appendChild(div);
                });
            }
        }

        function selectAvatarStyle(styleId) {
            // Check if trying to select locked style
            const isExclusive = AVATAR_STYLES_EXCLUSIVE.some(s => s.id === styleId);
            if(isExclusive && totalScore < 50000) {
                alert("¡Este avatar es exclusivo para Rango Heroico!");
                return;
            }

            currentAvatarStyle = styleId;
            renderAvatarOptions();
            renderMainAvatar();
        }

        async function saveAvatarChoice() {
            await _supabase.from('profiles').upsert({ id: currentUser.id, avatar_style: currentAvatarStyle });
            toggleAvatarModal();
            updateRanking();
        }

        async function saveScore() {
            if (!currentUser) return;
            try {
                await _supabase.from('profiles').upsert({ id: currentUser.id, username: currentUser.email.split('@')[0], total_score: totalScore });
                updateRanking();
            } catch(e) { console.error(e); }
        }

        let rankInt;
        function startRanking() { updateRanking(); rankInt = setInterval(updateRanking, 5000); }
        
        async function updateRanking() {
            const list = document.getElementById('ranking-list');
            try {
                const { data, error } = await _supabase.from('profiles').select('username, total_score, avatar_style').order('total_score', { ascending: false }).limit(10);
                if(error) throw error;
                if (!data || data.length === 0) { list.innerHTML = '<li style="text-align:center; padding:10px; color:#666;">No hay datos.</li>'; return; }
                list.innerHTML = data.map((u, i) => {
                    const s = u.total_score || 0;
                    const rI = getRankInfo(s);
                    const isMe = (currentUser && u.username === currentUser.email.split('@')[0]);
                    let cls = "ranking-item " + rI.css;
                    if(isMe) cls += " me";
                    const style = u.avatar_style || 'adventurer';
                    const avatarUrl = getAvatarUrl(u.username || 'guest', style);
                    return `<li class="${cls}">
                        <span class="rank-pos">${i+1}.</span>
                        <div class="rank-row">
                            <img src="${avatarUrl}" class="list-avatar ${rI.avatar}">
                            <div class="rank-info">
                                <span class="rank-name-list">${u.username||'Yo'}</span>
                                <span class="rank-tier-list">${rI.icon} ${rI.name} ${rI.tier}</span>
                            </div>
                        </div>
                        <span class="rank-score">${s}</span>
                    </li>`;
                }).join('');
            } catch(err) { list.innerHTML = '<li style="text-align:center; padding:10px; color:red;">Error al cargar.</li>'; }
        }

        // GAME LOGIC
        function initGame() { loadProblem(); document.getElementById('levelSelect').value = currentMainLevel; }
        function jumpToLevel(l) { currentMainLevel=parseInt(l); currentProblemInLevel=1; loadProblem(); }
        
        function loadProblem() {
            document.getElementById('subLevelCount').innerText = currentProblemInLevel;
            document.getElementById('progressBar').style.width = ((currentMainLevel - 1) / TOTAL_LEVELS) * 100 + '%';
            document.getElementById('levelSelect').value = currentMainLevel;
            const d = DB[currentMainLevel];
            if (d && d[currentProblemInLevel - 1]) { currentDividend = d[currentProblemInLevel - 1].d; currentDivisor = d[currentProblemInLevel - 1].div; }
            const label = getDifficultyLabel(currentMainLevel);
            document.getElementById('difficultyLabel').innerText = label;
            createUI(); createAntena(); resetAll();
        }

        function getDifficultyLabel(lvl) {
            if(lvl <= 2) return "Divisor: 1 Cifra";
            if(lvl === 3 || lvl === 4 || lvl === 5 || lvl === 7 || lvl === 9) return "Divisor: 2 Cifras";
            return "Divisor: 3 Cifras";
        }

        function createUI() {
            const g = document.getElementById('gridContainer'); const dB = document.getElementById('divisorBox'); const tR = document.getElementById('topRow');
            g.innerHTML = ''; dB.innerHTML = ''; tR.innerHTML = '';
            String(currentDivisor).split('').forEach(n => { let i=document.createElement('input'); i.type='text'; i.className='input-div'; i.value=n; i.readOnly=true; dB.appendChild(i); });
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    let i = document.createElement('input');
                    i.type='text'; i.className='cell'; i.maxLength=1; i.id="c-"+r+"-"+c;
                    i.addEventListener('mousedown', (e) => { if(sel){ e.preventDefault(); drag=true; sC={r,c}; eC={r,c}; updS(); } });
                    i.addEventListener('mouseenter', (e) => { if(sel&&drag){ eC={r,c}; updS(); } });
                    i.addEventListener('input', (e) => { if(!sel&&e.target.value){ let n=(c<cols-1)?"c-"+r+"-"+(c+1):(r<rows-1)?"c-"+(r+1)+"-0":null; if(n)document.getElementById(n).focus(); }});
                    g.appendChild(i);
                }
            }
            document.onmouseup = () => { drag=false; };
            let sN = String(currentDividend);
            for(let i=0; i<sN.length; i++) { let cell = document.getElementById("c-0-"+i); cell.value = sN[i]; cell.classList.add('cell-locked'); cell.disabled = true; }
            document.getElementById('lineH').style.width = (sN.length * cellSize) + 'px';
            for(let c=0; c<sN.length; c++) { let i=document.createElement('input'); i.type='text'; i.className='input-cociente'; i.maxLength=1; i.id="top-"+c; i.addEventListener('input', (e) => { syncT(); if(e.target.value && c<sN.length-1) document.getElementById("top-"+(c+1)).focus(); }); tR.appendChild(i); }
        }

        let sel=false, drag=false, sC=null, eC=null, selC=new Set();
        function toggleSelectMode() { sel=!sel; document.getElementById('btnSelectMode').classList.toggle('active', sel); if(!sel) clrS(); }
        function updS() { clrS(); if(!sC||!eC)return; let minR=Math.min(sC.r,eC.r),maxR=Math.max(sC.r,eC.r),minC=Math.min(sC.c,eC.c),maxC=Math.max(sC.c,eC.c); for(let r=minR;r<=maxR;r++)for(let c=minC;c<=maxC;c++){let el=document.getElementById("c-"+r+"-"+c); if(el){el.classList.add('cell-selected'); selC.add(el.id);}} }
        function clrS() { selC.forEach(id=>{let el=document.getElementById(id); if(el)el.classList.remove('cell-selected');}); selC.clear(); }
        function applyBorder(t) { selC.forEach(id=>{let el=document.getElementById(id); if(el){if(t==='clear'){el.classList.remove('border-bottom','border-right');}else{el.classList.add("border-"+t);}}}); }
        function syncT() { let v=""; document.querySelectorAll('.input-cociente').forEach(x=>v+=x.value); document.getElementById('valCociente').value=v; }

        function createAntena() {
            const b=document.getElementById('antenaBody'); document.getElementById('antenaLabel').innerText=currentDivisor; b.innerHTML='';
            for(let i=1;i<=10;i++){let r=document.createElement('div'); r.className='antena-row'; r.innerHTML="<span>"+i+" x "+currentDivisor+" =</span><input type='number' class='antena-input' id='a"+i+"'>"; b.appendChild(r);}
        }
        function resetAll() {
            document.getElementById('valCociente').value=''; document.getElementById('valResiduo').value='';
            document.querySelectorAll('.antena-input').forEach(i => { i.value=''; i.classList.remove('status-ok','status-wrong'); });
            document.querySelectorAll('.input-cociente').forEach(i => i.value='');
            document.querySelectorAll('.cell:not(.cell-locked)').forEach(i => { i.value=''; i.disabled=false; });
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('border-bottom','border-right','cell-selected'));
            selC.clear();
        }
        function validarAntena() {
            let ok=true;
            for(let i=1;i<=10;i++){let inp=document.getElementById("a"+i); let v=parseInt(inp.value); if(v===i*currentDivisor){inp.classList.add('status-ok');inp.classList.remove('status-wrong');}else{inp.classList.add('status-wrong');inp.classList.remove('status-ok');ok=false;}}
            document.getElementById('msg').innerText = ok ? "¡Antena correcta!" : "Corrige."; document.getElementById('msg').style.color = ok ? "var(--success)" : "var(--error)";
        }
        async function verificarSolucion() {
            let coc=parseInt(document.getElementById('valCociente').value); let res=parseInt(document.getElementById('valResiduo').value)||0;
            let rC=Math.floor(currentDividend/currentDivisor); let rR=currentDividend%currentDivisor;
            if(coc===rC && res===rR) {
                totalScore+=POINTS; updateUI(); await saveScore();
                document.getElementById('msg').innerHTML="<span style='color:var(--success); font-weight:700;'>¡Correcto! +"+POINTS+"</span>";
                setTimeout(() => {
                    if(currentProblemInLevel<PROBLEMS_PER_LEVEL)currentProblemInLevel++;
                    else{if(currentMainLevel<TOTAL_LEVELS){currentMainLevel++;currentProblemInLevel=1;}else{alert("¡FIN!");currentMainLevel=1;currentProblemInLevel=1;totalScore=0;updateUI();}}
                    loadProblem();
                }, 2000);
            } else { document.getElementById('msg').innerHTML="<span style='color:var(--error); font-weight:700;'>Incorrecto.</span>"; }
        }
    </script>
